<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>Redorblack</title>
    <link rel="stylesheet" href="redorblack.css" />
  </head>
  <body>
    <div class="container">
      <h1>Red or Black</h1>
      <p>Pick a color and test your luck!</p>
      <div class="buttons">
        <button class="red js-spin" data-buttontype="red">Red</button>
        <button class="black js-spin" data-buttontype="black">Black</button>
      </div>
      <p id="results"></p>
      <p>Balance: € <span id="balance">100</span></p>
    </div>
    <script src="redorblack.js"></script>
  </body>
</html>
