<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>Randomnumbergame</title>
    <link rel="stylesheet" href="randomnumbergame.css" />
  </head>
  <body>
    <h1>Hobbit Breakfast Game</h1>
    <p>
      How many breakfasts have I had today? (Hobbits are known for having up to
      **seven**!)
    </p>
    <input
      id="js-random-number"
      type="number"
      min="0"
      max="10"
      placeholder="0 - 10"
    />
    <button id="js-random-button" type="button">Check!</button>
    <p id="js-random-result">Let's see if you're a true Hobbit...</p>

    <footer>
      Fun Fact: Hobbits enjoy **seven meals a day** – Breakfast, Second
      Breakfast, Elevenses, Luncheon, Afternoon Tea, Dinner, and Supper!
    </footer>

    <script src="randomnumbergame.js"></script>
  </body>
</html>
