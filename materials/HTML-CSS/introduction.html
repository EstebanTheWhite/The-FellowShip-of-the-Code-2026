<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>Introduction-HTMLandCSS</title>
    <link rel="stylesheet" href="introduction.css" />
  </head>
  <body>
    <h1>A headline</h1>
    <h2>A subtitle</h2>
    <p>
      This is a <strong>bold text</strong>.... this is a
      <em>italic text</em> ... simple, isn't it? :-)
    </p>
    <ul>
      <li>List entry #1</li>
      <li>List entry #2</li>
      <li>List entry #3</li>
    </ul>
    <a href="https://www.nafra.at">www.nafra.at</a>
    <a class="red" href="https://www.nafra.at">www.nafra.at</a>
    <p>
      <span class="text" style="background-color: #000"
        >Some more description</span
      >
    </p>
    <p>
      <span class="text-large" style="background-color: #000"
        >Some other description</span
      >
    </p>
    <table>
      <thead>
        <th>Headling #1</th>
        <th>Headling #2</th>
        <th>Headling #3</th>
      </thead>
      <tbody>
        <th>Body #1</th>
        <th>Body #2</th>
        <th>Body #3</th>
      </tbody>
    </table>
  </body>
</html>
